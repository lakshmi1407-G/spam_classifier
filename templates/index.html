<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a002b, #3a0ca3, #7209b7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,0,255,0.3);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .metrics {
            font-size: 14px;
            margin-bottom: 20px;
            color: #ffccff;
        }

        textarea {
            width: 100%;
            height: 110px;
            border-radius: 12px;
            border: none;
            padding: 15px;
            font-size: 14px;
            outline: none;
        }

        textarea:focus {
            box-shadow: 0 0 10px #ff00ff;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff00ff;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .spam {
            color: #ff4d4d;
        }

        .notspam {
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📧 Spam Detector</h1>

    <div class="metrics">
        Accuracy: {{ accuracy }}% | Precision: {{ precision }}%
    </div>

    <form method="POST">
        <textarea name="message" placeholder="Type your message...">{{ user_input }}</textarea>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result {% if 'Spam' in result %}spam{% else %}notspam{% endif %}">
            {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
